<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Subir Evidencia - Vita Mirabilis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      color: #1a1a2e;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
      width: 100%;
      max-width: 400px;
    }
    .header h1 {
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 14px;
      color: #666;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .paciente-info {
      background: #f0f7ff;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .paciente-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #2563eb;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .paciente-nombre {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }
    .form-group select,
    .form-group input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      background: white;
      color: #1a1a2e;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    .form-group select:focus,
    .form-group input[type="text"]:focus {
      outline: none;
      border-color: #2563eb;
    }
    .upload-area {
      border: 3px dashed #d1d5db;
      border-radius: 16px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .upload-area:hover,
    .upload-area.dragover {
      border-color: #2563eb;
      background: #f0f7ff;
    }
    .upload-area.has-image {
      padding: 0;
      border-style: solid;
      border-color: #22c55e;
    }
    .upload-area input[type="file"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    .upload-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      color: #9ca3af;
    }
    .upload-text {
      font-size: 15px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .upload-hint {
      font-size: 12px;
      color: #9ca3af;
    }
    .preview-img {
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: 12px;
      display: block;
    }
    .btn-upload {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-upload:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }
    .btn-upload:not(:disabled):hover {
      background: #1d4ed8;
    }
    .success-msg {
      text-align: center;
      padding: 32px 16px;
    }
    .success-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      color: #22c55e;
    }
    .success-msg h2 {
      font-size: 20px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    .success-msg p {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }
    .error-msg {
      background: #fef2f2;
      border: 2px solid #fecaca;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
    }
    .error-msg h3 {
      color: #dc2626;
      font-size: 16px;
      margin-bottom: 4px;
    }
    .error-msg p {
      color: #991b1b;
      font-size: 13px;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <h1>Vita Mirabilis</h1>
    <p>Subir evidencia clinica</p>
  </div>

  <div class="card" id="mainCard">
    <div id="loadingState" style="text-align:center;padding:32px;">
      <div class="spinner" style="border-top-color:#2563eb;width:32px;height:32px;border-width:4px;"></div>
      <p style="margin-top:12px;color:#666;">Verificando acceso...</p>
    </div>

    <div id="errorState" style="display:none;"></div>

    <div id="uploadForm" style="display:none;">
      <div class="paciente-info">
        <div class="paciente-avatar" id="avatar">?</div>
        <div class="paciente-nombre" id="pacienteNombre">Cargando...</div>
      </div>

      <form id="form" enctype="multipart/form-data">
        <input type="hidden" id="tokenField" name="token">

        <div class="form-group">
          <label>Tipo de imagen</label>
          <select id="tipoField" name="tipo">
            <option value="foto">Foto clinica</option>
            <option value="radiografia">Radiografia</option>
            <option value="panoramica">Panoramica</option>
            <option value="intraoral">Intraoral</option>
          </select>
        </div>

        <div class="form-group">
          <label>Descripcion (opcional)</label>
          <input type="text" id="descField" name="descripcion" placeholder="Ej: Radiografia panoramica">
        </div>

        <div class="upload-area" id="uploadArea">
          <input type="file" id="fileInput" name="archivo" accept="image/*" capture="environment">
          <div id="uploadPlaceholder">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
              <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <p class="upload-text">Toca para tomar foto o seleccionar</p>
            <p class="upload-hint">JPG, PNG, GIF, WEBP (max 10MB)</p>
          </div>
          <img id="previewImg" class="preview-img" style="display:none;">
        </div>

        <button type="submit" class="btn-upload" id="btnUpload" disabled>
          Subir imagen
        </button>
      </form>
    </div>

    <div id="successState" style="display:none;">
      <div class="success-msg">
        <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <h2>Imagen subida</h2>
        <p>Tu evidencia clinica fue registrada correctamente.</p>
        <button class="btn-upload" onclick="resetForm()" style="background:#059669;">
          Subir otra imagen
        </button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const previewImg = document.getElementById('previewImg');
    const uploadPlaceholder = document.getElementById('uploadPlaceholder');
    const btnUpload = document.getElementById('btnUpload');
    const form = document.getElementById('form');

    if (!token) {
      showError('Token no proporcionado', 'Solicite un nuevo codigo QR al doctor.');
    } else {
      document.getElementById('tokenField').value = token;
      verifyToken();
    }

    async function verifyToken() {
      try {
        const res = await fetch('/api/imagenes/upload-movil', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, paciente_id: 0 })
        });

        if (res.status === 401) {
          const data = await res.json();
          showError('Token invalido', data.error || 'El token no es valido o ya expiro.');
          return;
        }

        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('uploadForm').style.display = 'block';

        document.getElementById('pacienteNombre').textContent = 'Paciente vinculado';
        document.getElementById('avatar').textContent = 'P';
      } catch {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('uploadForm').style.display = 'block';
        document.getElementById('pacienteNombre').textContent = 'Paciente vinculado';
        document.getElementById('avatar').textContent = 'P';
      }
    }

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 10 * 1024 * 1024) {
        alert('El archivo supera 10MB');
        fileInput.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = (ev) => {
        previewImg.src = ev.target.result;
        previewImg.style.display = 'block';
        uploadPlaceholder.style.display = 'none';
        uploadArea.classList.add('has-image');
        btnUpload.disabled = false;
      };
      reader.readAsDataURL(file);
    });

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        fileInput.dispatchEvent(new Event('change'));
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const file = fileInput.files[0];
      if (!file) return;

      btnUpload.disabled = true;
      btnUpload.innerHTML = '<span class="spinner"></span> Subiendo...';

      const formData = new FormData();
      formData.append('archivo', file);
      formData.append('token', token);
      formData.append('tipo', document.getElementById('tipoField').value);
      formData.append('descripcion', document.getElementById('descField').value);

      try {
        const res = await fetch('/api/imagenes/upload-movil', {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (res.ok) {
          document.getElementById('uploadForm').style.display = 'none';
          document.getElementById('successState').style.display = 'block';
        } else {
          alert(data.error || 'Error al subir imagen');
          btnUpload.disabled = false;
          btnUpload.textContent = 'Subir imagen';
        }
      } catch {
        alert('Error de conexion. Verifique su red WiFi.');
        btnUpload.disabled = false;
        btnUpload.textContent = 'Subir imagen';
      }
    });

    function showError(title, msg) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
      document.getElementById('errorState').innerHTML = `
        <div class="error-msg">
          <h3>${title}</h3>
          <p>${msg}</p>
        </div>
      `;
    }

    function resetForm() {
      document.getElementById('successState').style.display = 'none';
      document.getElementById('uploadForm').style.display = 'block';
      fileInput.value = '';
      previewImg.style.display = 'none';
      uploadPlaceholder.style.display = 'block';
      uploadArea.classList.remove('has-image');
      btnUpload.disabled = true;
      btnUpload.textContent = 'Subir imagen';
      document.getElementById('descField').value = '';
    }
  </script>
</body>
</html>
